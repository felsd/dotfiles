# Wayland + Qt env vars for systemd user services (DMS, etc).
# niri's `environment {}` block only applies to processes spawned by niri.
# Systemd-user services inherit from this file via systemd's environment-import
# (https://www.freedesktop.org/software/systemd/man/environment.d.html).
# Required so DMS / quickshell start in Wayland mode rather than xcb.

QT_QPA_PLATFORM=wayland
QT_QPA_PLATFORMTHEME=gtk3
ELECTRON_OZONE_PLATFORM_HINT=auto
MOZ_ENABLE_WAYLAND=1
GDK_BACKEND=wayland,x11
NIXOS_OZONE_WL=1
